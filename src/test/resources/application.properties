spring.application.name=movie-booking-test

# Dedicated test database. Tests commit for real — the concurrency test depends on
# genuine transaction boundaries — so they cannot share the development database.
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_booking_test
spring.datasource.username=${DB_USER:roney}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Wiped and rebuilt once per context by TestDatabaseConfig, so every run starts from
# the same known seed.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed
spring.flyway.clean-disabled=false

spring.jackson.default-property-inclusion=non_null
server.error.include-stacktrace=never
server.error.include-message=never

# The sweeper would race the tests that assert on hold state.
spring.task.scheduling.enabled=false

logging.level.org.hibernate.SQL=warn
