spring.application.name=movie-booking

# --- Datasource ---------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_booking
spring.datasource.username=${DB_USER:roney}
spring.datasource.password=${DB_PASSWORD:}

# --- JPA ----------------------------------------------------------------
# Flyway owns the schema; Hibernate only validates that entities match it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway -------------------------------------------------------------
# db/seed holds demo data. Drop it from this list to provision an empty instance.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed

# --- Jackson ------------------------------------------------------------
# Dates serialize as ISO-8601 by default in Boot 4 / Jackson 3.
spring.jackson.default-property-inclusion=non_null

# --- Errors -------------------------------------------------------------
# Never leak stack traces or internal messages to clients.
server.error.include-stacktrace=never
server.error.include-message=never

# --- Actuator -----------------------------------------------------------
management.endpoints.web.exposure.include=health,info
